name = "nuojiji-relay"
main = "worker.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# Outbox + 推送订阅都存这个 KV namespace。
# 部署前先建：
#   wrangler kv namespace create OUTBOX
# 把返回的 id 填到下面 binding 的 id 字段。
[[kv_namespaces]]
binding = "OUTBOX"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# secret 不写这里，用命令设：
#   wrangler secret put RELAY_SECRET
#   wrangler secret put VAPID_PUBLIC_KEY     # 可选（不设则只走轮询，无推送）
#   wrangler secret put VAPID_PRIVATE_KEY
#   wrangler secret put VAPID_SUBJECT        # 如 mailto:you@example.com

# Phase 2：定时主动生成（角色 App 关闭也能主动找你）。
# 每分钟 tick：遍历已注册的 pair 重算 impulse，命中就实时调 AI 生成 → outbox + 推送。
# 不需要主动消息可注释掉这两行。
[triggers]
crons = ["* * * * *"]
